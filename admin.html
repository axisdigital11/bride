<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>בק אופיס — bride</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0A0A0C;--bg-2:#101015;--panel:#16161D;--panel-2:#1E1E27;
  --ink:#F7F6F4;--ink-soft:#D9D8DE;--muted:#9C9CA7;
  --accent:#F08A5B;--accent-deep:#D96B3C;--accent-soft:rgba(240,138,91,.13);
  --green:#4CAF82;--green-soft:rgba(76,175,130,.13);
  --red:#E05C5C;--red-soft:rgba(224,92,92,.13);
  --yellow:#F0C85B;--yellow-soft:rgba(240,200,91,.13);
  --line:rgba(255,255,255,.09);--r:12px;
  --display:'Heebo',sans-serif;--body:'Assistant',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--body);background:var(--bg);color:var(--ink);min-height:100vh;
  -webkit-font-smoothing:antialiased;}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px}
.login-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;
  padding:40px;width:100%;max-width:380px;text-align:center}
.login-card .logo{font-family:var(--display);font-weight:900;font-size:26px;
  color:var(--accent);margin-bottom:6px}
.login-card p{color:var(--muted);font-size:14px;margin-bottom:28px}
.login-card input{width:100%;padding:13px 16px;border-radius:10px;
  border:1px solid var(--line);background:var(--bg-2);color:var(--ink);
  font-family:var(--body);font-size:15px;outline:none;margin-bottom:14px;
  transition:.2s;text-align:center;letter-spacing:2px}
.login-card input:focus{border-color:var(--accent)}
.login-card button{width:100%;padding:14px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent-deep));
  color:#fff;font-family:var(--display);font-weight:800;font-size:16px;cursor:pointer}
.login-card .err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}

/* MAIN */
#mainScreen{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--panel);border-bottom:1px solid var(--line);
  padding:16px 28px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10}
.topbar .logo{font-family:var(--display);font-weight:900;font-size:22px;color:var(--accent)}
.topbar .sub{font-size:13px;color:var(--muted);margin-top:2px}
.topbar-right{display:flex;gap:10px;align-items:center}
.btn-sm{padding:8px 14px;border:none;border-radius:8px;font-family:var(--body);
  font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.btn-outline{background:transparent;border:1px solid var(--line);color:var(--ink-soft)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{filter:brightness(1.1)}

.content{padding:28px;flex:1}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px 22px}
.stat-card .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.stat-card .value{font-family:var(--display);font-weight:900;font-size:28px;color:var(--ink)}
.stat-card .value.green{color:var(--green)}
.stat-card .value.accent{color:var(--accent)}
.stat-card .sub-val{font-size:12px;color:var(--muted);margin-top:4px}

/* SOURCES */
.sources-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
.sources-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px 22px}
.sources-card h3{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.source-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.source-bar .name{font-size:13px;min-width:90px;color:var(--ink-soft)}
.source-bar .bar-wrap{flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden}
.source-bar .bar-fill{height:100%;border-radius:3px;background:var(--accent);transition:.4s}
.source-bar .count{font-size:12px;color:var(--muted);min-width:30px;text-align:left}

/* FILTERS */
.filters-bar{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  padding:16px 20px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.filters-bar select,.filters-bar input{
  padding:8px 12px;border-radius:8px;border:1px solid var(--line);
  background:var(--bg-2);color:var(--ink);font-family:var(--body);font-size:13px;outline:none}
.filters-bar select:focus,.filters-bar input:focus{border-color:var(--accent)}
.filters-bar label{font-size:12px;color:var(--muted);margin-left:4px}
.filter-group{display:flex;flex-direction:column;gap:4px}

/* TABLE */
.table-wrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.table-head{padding:14px 20px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between}
.table-head h2{font-size:15px;font-weight:700}
.table-head .count-badge{background:var(--accent-soft);color:var(--accent);
  font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  color:var(--muted);padding:12px 16px;text-align:right;border-bottom:1px solid var(--line);
  white-space:nowrap}
td{padding:13px 16px;font-size:13px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--panel-2)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;
  border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.badge.paid{background:var(--green-soft);color:var(--green)}
.badge.pending{background:var(--yellow-soft);color:var(--yellow)}
.badge.failed{background:var(--red-soft);color:var(--red)}
.source-tag{background:var(--accent-soft);color:var(--accent);
  padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.empty{padding:60px 20px;text-align:center;color:var(--muted);font-size:14px}
.loading{padding:60px 20px;text-align:center;color:var(--muted)}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--line);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;
  margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  .sources-row{grid-template-columns:1fr}
  .content{padding:16px}
  table{display:block;overflow-x:auto}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="logo">bride</div>
    <p>בק אופיס — גישה מוגבלת</p>
    <input type="password" id="pwInput" placeholder="סיסמה" onkeydown="if(event.key==='Enter')doLogin()" />
    <button onclick="doLogin()">כניסה</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- MAIN -->
<div id="mainScreen">
  <div class="topbar">
    <div>
      <div class="logo">bride — בק אופיס</div>
      <div class="sub" id="lastRefresh"></div>
    </div>
    <div class="topbar-right">
      <button class="btn-sm btn-outline" onclick="exportCSV()">ייצוא CSV</button>
      <button class="btn-sm btn-accent" onclick="loadSales()">רענן</button>
    </div>
  </div>

  <div class="content">
    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">סה"כ מכירות</div>
        <div class="value green" id="statTotal">—</div>
        <div class="sub-val" id="statTotalCount"></div>
      </div>
      <div class="stat-card">
        <div class="label">מכירות שולמו</div>
        <div class="value accent" id="statPaid">—</div>
        <div class="sub-val" id="statPaidCount"></div>
      </div>
      <div class="stat-card">
        <div class="label">ממתינות לתשלום</div>
        <div class="value" id="statPending">—</div>
      </div>
      <div class="stat-card">
        <div class="label">היום</div>
        <div class="value" id="statToday">—</div>
      </div>
    </div>

    <!-- SOURCES -->
    <div class="sources-row">
      <div class="sources-card">
        <h3>מקורות הגעה</h3>
        <div id="sourcesChart"></div>
      </div>
      <div class="sources-card">
        <h3>קמפיינים</h3>
        <div id="campaignsChart"></div>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="filters-bar">
      <div class="filter-group">
        <label>סטטוס</label>
        <select id="filterStatus" onchange="applyFilters()">
          <option value="">הכל</option>
          <option value="paid">שולם</option>
          <option value="pending">ממתין</option>
          <option value="failed">נכשל</option>
        </select>
      </div>
      <div class="filter-group">
        <label>מקור</label>
        <select id="filterSource" onchange="applyFilters()">
          <option value="">כל המקורות</option>
        </select>
      </div>
      <div class="filter-group">
        <label>מתאריך</label>
        <input type="date" id="filterFrom" onchange="applyFilters()" />
      </div>
      <div class="filter-group">
        <label>עד תאריך</label>
        <input type="date" id="filterTo" onchange="applyFilters()" />
      </div>
      <div class="filter-group">
        <label>חיפוש</label>
        <input type="text" id="filterSearch" placeholder="שם / מייל / טלפון" oninput="applyFilters()" style="min-width:180px" />
      </div>
      <button class="btn-sm btn-outline" onclick="clearFilters()" style="margin-top:18px">נקה</button>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <div class="table-head">
        <h2>רשימת לקוחות</h2>
        <span class="count-badge" id="tableCount">0</span>
      </div>
      <div id="tableContainer">
        <div class="loading"><div class="spinner"></div><br>טוען נתונים...</div>
      </div>
    </div>
  </div>
</div>

<script>
const WORKER_URL = "https://bride-payment.axis-office11.workers.dev";
let allSales = [];
let adminToken = '';

function doLogin() {
  const pw = document.getElementById('pwInput').value.trim();
  if (!pw) return;
  adminToken = pw;
  loadSales();
}

async function loadSales() {
  try {
    const res = await fetch(`${WORKER_URL}/sales?token=${encodeURIComponent(adminToken)}`);
    if (res.status === 401) {
      document.getElementById('loginErr').textContent = 'סיסמה שגויה';
      adminToken = '';
      return;
    }
    const data = await res.json();
    allSales = data.sales || [];

    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'flex';
    document.getElementById('lastRefresh').textContent =
      'עודכן: ' + new Date().toLocaleTimeString('he-IL');

    updateStats();
    updateCharts();
    updateSourceFilter();
    applyFilters();
  } catch(e) {
    document.getElementById('loginErr').textContent = 'שגיאת חיבור';
  }
}

function updateStats() {
  const paid = allSales.filter(s => s.status === 'paid');
  const pending = allSales.filter(s => s.status === 'pending');
  const today = allSales.filter(s => {
    const d = new Date(s.createdAt);
    const now = new Date();
    return d.toDateString() === now.toDateString();
  });

  const totalRevenue = paid.reduce((sum, s) => sum + (s.amount || 0), 0);

  document.getElementById('statTotal').textContent = `₪${totalRevenue.toLocaleString('he-IL')}`;
  document.getElementById('statTotalCount').textContent = `${allSales.length} עסקאות סה"כ`;
  document.getElementById('statPaid').textContent = paid.length;
  document.getElementById('statPaidCount').textContent = `₪${totalRevenue.toLocaleString('he-IL')} הכנסה`;
  document.getElementById('statPending').textContent = pending.length;
  document.getElementById('statToday').textContent = today.length;
}

function updateCharts() {
  renderBarChart('sourcesChart', countBy(allSales, 'utm_source', 'ישיר'));
  renderBarChart('campaignsChart', countBy(allSales, 'utm_campaign', '—'));
}

function countBy(sales, field, fallback) {
  const counts = {};
  sales.forEach(s => {
    const val = s[field] || fallback;
    counts[val] = (counts[val] || 0) + 1;
  });
  return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 6);
}

function renderBarChart(containerId, entries) {
  const el = document.getElementById(containerId);
  if (!entries.length) { el.innerHTML = '<div style="color:var(--muted);font-size:13px">אין נתונים</div>'; return; }
  const max = entries[0][1];
  el.innerHTML = entries.map(([name, count]) => `
    <div class="source-bar">
      <span class="name">${name}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(count/max*100)}%"></div></div>
      <span class="count">${count}</span>
    </div>`).join('');
}

function updateSourceFilter() {
  const sources = [...new Set(allSales.map(s => s.utm_source || 'ישיר'))];
  const sel = document.getElementById('filterSource');
  const cur = sel.value;
  sel.innerHTML = '<option value="">כל המקורות</option>' +
    sources.map(s => `<option value="${s}" ${s===cur?'selected':''}>${s}</option>`).join('');
}

function applyFilters() {
  const status = document.getElementById('filterStatus').value;
  const source = document.getElementById('filterSource').value;
  const from = document.getElementById('filterFrom').value;
  const to = document.getElementById('filterTo').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();

  let filtered = allSales.filter(s => {
    if (status && s.status !== status) return false;
    if (source && (s.utm_source || 'ישיר') !== source) return false;
    if (from && new Date(s.createdAt) < new Date(from)) return false;
    if (to && new Date(s.createdAt) > new Date(to + 'T23:59:59')) return false;
    if (search) {
      const hay = `${s.firstName} ${s.lastName} ${s.email} ${s.phone}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  document.getElementById('tableCount').textContent = filtered.length;
  renderTable(filtered);
}

function clearFilters() {
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterSource').value = '';
  document.getElementById('filterFrom').value = '';
  document.getElementById('filterTo').value = '';
  document.getElementById('filterSearch').value = '';
  applyFilters();
}

function renderTable(sales) {
  const container = document.getElementById('tableContainer');
  if (!sales.length) {
    container.innerHTML = '<div class="empty">לא נמצאו עסקאות</div>';
    return;
  }

  const rows = sales.map(s => {
    const date = new Date(s.createdAt).toLocaleDateString('he-IL', {
      day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'
    });
    const statusBadge = {
      paid: '<span class="badge paid">✓ שולם</span>',
      pending: '<span class="badge pending">⏳ ממתין</span>',
      failed: '<span class="badge failed">✗ נכשל</span>',
    }[s.status] || `<span class="badge">${s.status}</span>`;

    const source = s.utm_source
      ? `<span class="source-tag">${s.utm_source}${s.utm_medium ? ' / ' + s.utm_medium : ''}</span>`
      : '<span style="color:var(--muted);font-size:12px">ישיר</span>';

    const campaign = s.utm_campaign
      ? `<span style="font-size:12px;color:var(--ink-soft)">${s.utm_campaign}</span>`
      : '—';

    return `<tr>
      <td>${date}</td>
      <td><strong>${s.firstName} ${s.lastName}</strong></td>
      <td><a href="mailto:${s.email}" style="color:var(--accent);text-decoration:none">${s.email}</a></td>
      <td>${s.phone}</td>
      <td>₪${(s.amount||0).toLocaleString('he-IL')}</td>
      <td>${statusBadge}</td>
      <td>${source}</td>
      <td>${campaign}</td>
    </tr>`;
  }).join('');

  container.innerHTML = `
    <table>
      <thead><tr>
        <th>תאריך</th><th>שם</th><th>מייל</th><th>טלפון</th>
        <th>סכום</th><th>סטטוס</th><th>מקור</th><th>קמפיין</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function exportCSV() {
  const headers = ['תאריך','שם פרטי','שם משפחה','מייל','טלפון','סכום','סטטוס','מקור','מדיום','קמפיין'];
  const rows = allSales.map(s => [
    new Date(s.createdAt).toLocaleString('he-IL'),
    s.firstName, s.lastName, s.email, s.phone,
    s.amount, s.status, s.utm_source||'', s.utm_medium||'', s.utm_campaign||''
  ]);
  const csv = [headers, ...rows].map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `bride-sales-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
</body>
</html>

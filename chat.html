<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bride — שאלי אותי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Heebo', sans-serif;
    background: #0A0A0C;
    color: #F7F6F4;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: #111114;
    border-bottom: 1px solid rgba(240,138,91,.2);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  .avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #F08A5B, #c05a2b);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 18px; color: #fff;
    flex-shrink: 0;
  }
  .header-info h2 { font-size: 16px; font-weight: 700; }
  .header-info p { font-size: 12px; color: #F08A5B; margin-top: 1px; }

  /* Messages area */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

  /* Bubbles */
  .msg {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user {
    background: #F08A5B;
    color: #fff;
    align-self: flex-start;
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    background: #1C1C22;
    color: #F7F6F4;
    align-self: flex-end;
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(255,255,255,.06);
  }
  .msg.typing {
    background: #1C1C22;
    align-self: flex-end;
    border: 1px solid rgba(255,255,255,.06);
    border-bottom-left-radius: 4px;
  }
  .dots span {
    display: inline-block;
    width: 7px; height: 7px;
    background: #888;
    border-radius: 50%;
    margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: .2s; }
  .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Input area */
  .input-area {
    background: #111114;
    border-top: 1px solid rgba(255,255,255,.07);
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  textarea {
    flex: 1;
    background: #1C1C22;
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 22px;
    padding: 11px 16px;
    color: #F7F6F4;
    font-family: 'Heebo', sans-serif;
    font-size: 15px;
    resize: none;
    outline: none;
    max-height: 120px;
    overflow-y: auto;
    line-height: 1.4;
  }
  textarea::placeholder { color: #666; }
  textarea:focus { border-color: rgba(240,138,91,.4); }
  button {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: #F08A5B;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background .15s;
  }
  button:hover { background: #d97340; }
  button:disabled { background: #444; cursor: default; }
  button svg { width: 20px; height: 20px; fill: #fff; }

  /* Welcome message */
  .welcome {
    text-align: center;
    color: #555;
    font-size: 13px;
    margin: auto 0;
    padding: 40px 0;
  }
  .welcome strong { color: #F08A5B; display: block; font-size: 17px; margin-bottom: 6px; }
</style>
</head>
<body>

<div class="header">
  <div class="avatar">N</div>
  <div class="header-info">
    <h2>ניב — העוזר שלך</h2>
    <p>bride · שאלי כל שאלה על שיווק ומכירות</p>
  </div>
</div>

<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <strong>היי אני בובי עוזר ה-AI שלך 👋</strong>
    אני אעזור לך בכל מה שקשור לשיווק ומכירות<br>וביחד נוכל לגדול ולסגור הרבה יותר כלות.<br>רק תגיד לי אם את/ה זכר או נקבה כדי שאדע איך לפנות אלייך🙂
  </div>
</div>

<div class="input-area">
  <textarea id="input" placeholder="כתבי שאלה..." rows="1"></textarea>
  <button id="send" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</div>

<script>
const WORKER_URL = 'https://bride-payment.axis-office11.workers.dev/chat';
const messages = [];

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function addBubble(text, role) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function showTyping() {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = 'msg typing';
  div.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  div.id = 'typing';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || sendBtn.disabled) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  addBubble(text, 'user');
  messages.push({ role: 'user', content: text });

  showTyping();

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages })
    });
    const data = await res.json();
    removeTyping();
    const reply = data.reply || 'אוי, משהו השתבש. נסי שוב.';
    addBubble(reply, 'bot');
    messages.push({ role: 'assistant', content: reply });
  } catch {
    removeTyping();
    addBubble('שגיאת חיבור. נסי שוב.', 'bot');
  }

  sendBtn.disabled = false;
  inputEl.focus();
}
</script>
</body>
</html>
